# config.yaml
# Plug-and-play BTC 5-min bot
markets:
  # Replace this slug with the latest active BTC 5-min market
  default_market: "btc-updown-5m-1773817200"
  api_base: "https://api.polymarket.com"

data:
  market_csv: "data/market_data.csv"
  features_csv: "data/features.csv"
  trades_csv: "data/trades.csv"
  ticker_csv: "data/live_ticker.csv"
  polymarket_csv: "data/polymarket_markets.csv"
  trader_signals_csv: "data/trader_signals.csv"
  trader_leaders_csv: "data/trader_leaders.csv"

data_sources:
  btc_ohlcv:
    provider: "binance"
    fallback_provider: "binance_us"
    symbol: "BTCUSDT"
    interval: "5m"

models:
  model_path: "models/model.pkl"

training:
  model_name: "ensemble"
  horizon_periods: 1
  test_size: 0.2
  random_state: 42

signals:
  edge_threshold: 0.03

collector:
  poll_seconds: 60
  candle_limit: 300
  retrain_minutes: null
  polymarket_csv: "data/polymarket_markets.csv"
  trader_signals_csv: "data/trader_signals.csv"
  trader_leaders_csv: "data/trader_leaders.csv"

trading:
  starting_cash: 10000.0
  buy_threshold: 0.55
  sell_threshold: 0.5
